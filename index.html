<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>4 Tháng Của Chúng Mình 💕</title>
<meta name="theme-color" content="#fda4af">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  :root{ font-family:'Be Vietnam Pro', ui-sans-serif, system-ui, sans-serif; }
  html, body{ margin:0; padding:0; overflow-x:hidden; background:#000; }
  .font-serif-vn{ font-family:'Playfair Display', ui-serif, Georgia, serif; }
  #app{ min-height:100dvh; width:100%; overflow-x:hidden; }

  /* ---------- Stage transition (mỗi slide có một "tính cách" chuyển động riêng, chậm rãi) ---------- */
  #stage{
    opacity:1; transform:translate(0,0) scale(1); filter:blur(0px);
    will-change: opacity, transform, filter;
  }
  #stage.no-transition{ transition:none !important; }

  /* ---------- Touch targets ---------- */
  .tap-target{ min-width:48px; min-height:48px; }

  /* ---------- Slide 1: floating hearts + typewriter ---------- */
  .hearts-layer{ position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:0; }
  .floating-heart{ position:absolute; bottom:-10%; opacity:0; animation-name:floatUp; animation-timing-function:ease-in; animation-iteration-count:infinite; filter:drop-shadow(0 2px 6px rgba(244,114,182,.35)); }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0) rotate(0deg); opacity:0; }
    12%{ opacity:.85; }
    100%{ transform:translateY(-115vh) translateX(24px) rotate(12deg); opacity:0; }
  }
  #typewriter-text::after{ content:'▏'; opacity:.6; animation:blink 1s step-start infinite; }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ---------- Slide 2: blur-in ---------- */
  .blur-in-text{ animation:blurIn 1.3s ease both; }
  @keyframes blurIn{ from{ filter:blur(12px); opacity:0; transform:translateY(10px);} to{ filter:blur(0); opacity:1; transform:translateY(0);} }
  .tilt-photo{ animation:tiltIn 1s ease both; }
  @keyframes tiltIn{ from{ opacity:0; transform:rotate(0deg) scale(.92);} to{ opacity:1; transform:rotate(-4deg) scale(1);} }

  /* ---------- Slide 3: drifting particles + slow line fade ---------- */
  .particle-box{ position:relative; }
  .particle{ position:absolute; top:50%; width:12px; height:12px; border-radius:9999px; transform:translateY(-50%); }
  .particle-a{ background:#93c5fd; box-shadow:0 0 22px 7px rgba(147,197,253,.55); left:50%; animation:driftLeft 7s ease-in-out infinite alternate; }
  .particle-b{ background:#fda4af; box-shadow:0 0 22px 7px rgba(253,164,175,.55); right:50%; animation:driftRight 7s ease-in-out infinite alternate; }
  @keyframes driftLeft{ 0%{ left:50%; } 100%{ left:6%; } }
  @keyframes driftRight{ 0%{ right:50%; } 100%{ right:6%; } }
  .slow-line{ opacity:0; animation:slowFadeIn 2.6s ease forwards; }
  @keyframes slowFadeIn{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:translateY(0);} }

  /* ---------- Slide 4: spring slide-up ---------- */
  .spring-up{ animation:springUp 900ms cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes springUp{ from{ opacity:0; transform:translateY(70px);} to{ opacity:1; transform:translateY(0);} }
  .shield-draw{ animation:fadeScale 1.1s ease both; }
  @keyframes fadeScale{ from{ opacity:0; transform:scale(.85);} to{ opacity:1; transform:scale(1);} }

  /* ---------- Slide 5: pulsing heart + mini hearts + gallery ---------- */
  .pulse-heart{ animation:pulseScale 1.7s ease-in-out infinite; }
  @keyframes pulseScale{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.13);} }
  .mini-heart{ position:fixed; pointer-events:none; z-index:9999; animation:miniHeartUp 1.5s ease-out forwards; }
  @keyframes miniHeartUp{ 0%{ transform:translateY(0) scale(1); opacity:1;} 100%{ transform:translateY(-170px) scale(1.5); opacity:0;} }
  .count-box{ animation:popIn .6s ease both; }
  @keyframes popIn{ from{ opacity:0; transform:scale(.85);} to{ opacity:1; transform:scale(1);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  .fade-in-slow{ animation: fadeIn 1.2s ease both; }

  ::selection{ background:#fda4af; color:#4c0519; }
</style>
</head>

// người dùng chạm/nhấn vào trang. Vì vậy ở lần chạm/nhấn đầu tiên bất kỳ chỗ nào trên

let firstInteractionHandled = false;
function handleFirstInteraction(){
  if(firstInteractionHandled) return;
  firstInteractionHandled = true;
  isMuted = false;
  bgm.muted = false;

  document.removeEventListener('click', handleFirstInteraction);

}

/* ============================================================
   HELPERS: typewriter / slow line fade / floating hearts / mini hearts / confetti
   ============================================================ */
let twInterval = null;
function typewriter(text, elId, speed=26){
  const el = document.getElementById(elId);
  if(!el) return;
  el.textContent = '';
  let i = 0;
  if(twInterval) clearInterval(twInterval);
  twInterval = setInterval(()=>{
    el.textContent += text.charAt(i);
    i++;
    if(i >= text.length) clearInterval(twInterval);
  }, speed);
}

function renderSlowFadeLines(lines, containerId){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = lines.map((line, idx) =>
    `<div class="slow-line" style="animation-delay:${(idx*1.5).toFixed(1)}s">${line}</div>`
  ).join('');
}

function spawnFloatingHearts(containerId, count=10){
  const el = document.getElementById(containerId);
  if(!el) return;
  el.innerHTML = '';
  for(let i=0;i<count;i++){
    const h = document.createElement('div');
    h.className = 'floating-heart';
    h.textContent = i % 2 === 0 ? '💗' : '💕';
    h.style.left = (Math.random()*88 + 2) + '%';
    h.style.fontSize = (14 + Math.random()*18) + 'px';
    h.style.animationDuration = (9 + Math.random()*7) + 's';
    h.style.animationDelay = (Math.random()*6) + 's';
    el.appendChild(h);
  }
}

function burstMiniHearts(x, y){
  for(let i=0;i<12;i++){
    const h = document.createElement('div');
    h.className = 'mini-heart';
    h.textContent = '❤️';
    h.style.left = (x + (Math.random()*80 - 40)) + 'px';
    h.style.top = y + 'px';
    h.style.fontSize = (16 + Math.random()*12) + 'px';
    h.style.animationDelay = (Math.random()*0.3) + 's';
    document.body.appendChild(h);
    h.addEventListener('animationend', ()=> h.remove());
  }
}

function safeConfetti(opts){
  try{
    if(typeof confetti === 'function'){ confetti(opts); }
  }catch(e){ console.warn('Không thể chạy hiệu ứng confetti:', e); }
}

function celebrateConfetti(){
  safeConfetti({ particleCount: 90, spread: 75, origin:{ y: 0.6 }, colors:['#fda4af','#f43f5e','#fde68a','#fff'] });
  setTimeout(()=> safeConfetti({ particleCount: 60, spread: 100, origin:{ y: 0.4 }, colors:['#fda4af','#fbbf24','#fff'] }), 350);
}

/* ============================================================
   LIVE COUNTER (Ngày / Giờ / Phút / Giây) — chạy liên tục toàn trang
   ============================================================ */
setInterval(()=>{
  const now = new Date();
  let diff = now - ANNIVERSARY_START;
  if(diff < 0) diff = 0;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);
  const dEl = document.getElementById('count-days');
  const hEl = document.getElementById('count-hours');
  const mEl = document.getElementById('count-minutes');
  const sEl = document.getElementById('count-seconds');
  if(dEl) dEl.textContent = days;
  if(hEl) hEl.textContent = String(hours).padStart(2,'0');
  if(mEl) mEl.textContent = String(minutes).padStart(2,'0');
  if(sEl) sEl.textContent = String(seconds).padStart(2,'0');
}, 1000);

/* Mỗi slide có một "tính cách" chuyển động riêng, chậm rãi hơn, không vội */
const SLIDE_TRANSITIONS = [
  { duration:1000, axis:'none', scale:0.9, blur:4  }, // Chào công chúa nhỏ — hiện ra dịu dàng
  { duration:1000, axis:'x',    translate:5, scale:0.97, blur:5 }, // Lời ngỏ — trượt nhẹ như lật trang thư
  { duration:1100, axis:'none', scale:0.92, blur:3  }, // 0 Khởi đầu ngọt ngào — zoom mờ nhẹ nhàng
  { duration:1000, axis:'x',    translate:7, scale:0.97, blur:7 }, // 1 Những vết rạn — trượt ngang + mờ, gợn sóng gió
  { duration:1500, axis:'none', scale:1,    blur:14 }, // 2 Sự im lặng — tan biến chậm rãi, không di chuyển
  { duration:1050, axis:'y',    translateY:9, scale:0.96, blur:3 }, // 3 Tấm khiên — trồi lên từ phía dưới, vững vàng
  { duration:1300, axis:'none', scale:0.86, blur:0  }, // 4 Lời hứa — nở bừng ấm áp
];
const EASE = 'cubic-bezier(.22,1,.36,1)';

function hiddenTransformFor(preset, dir, mode){
  if(preset.axis === 'x'){
    const sign = mode === 'leave' ? (dir > 0 ? -1 : 1) : (dir > 0 ? 1 : -1);
    return `translateX(${sign * preset.translate}%) scale(${preset.scale})`;
  }
  if(preset.axis === 'y'){
    return `translateY(${preset.translateY}%) scale(${preset.scale})`;
  }
  return `scale(${preset.scale})`;
}

function transitionTo(newIndex, direction){
  const stage = document.getElementById('stage');
  const dir = direction !== undefined ? direction : (newIndex > currentSlide ? 1 : -1);
  const outPreset = SLIDE_TRANSITIONS[currentSlide];
  const inPreset = SLIDE_TRANSITIONS[newIndex];

  stage.classList.remove('no-transition');
  stage.style.transition = `opacity ${outPreset.duration}ms ${EASE}, transform ${outPreset.duration}ms ${EASE}, filter ${outPreset.duration}ms ${EASE}`;
  stage.style.opacity = '0';
  stage.style.transform = hiddenTransformFor(outPreset, dir, 'leave');
  stage.style.filter = `blur(${outPreset.blur}px)`;

  setTimeout(()=>{
    currentSlide = newIndex;
    renderSlide();

    stage.classList.add('no-transition');
    stage.style.opacity = '0';
    stage.style.transform = hiddenTransformFor(inPreset, dir, 'enter');
    stage.style.filter = `blur(${inPreset.blur}px)`;

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        stage.classList.remove('no-transition');
        stage.style.transition = `opacity ${inPreset.duration}ms ${EASE}, transform ${inPreset.duration}ms ${EASE}, filter ${inPreset.duration}ms ${EASE}`;
        stage.style.opacity = '1';
        stage.style.transform = 'translate(0,0) scale(1)';
        stage.style.filter = 'blur(0px)';
      });
    });
  }, outPreset.duration);
}

function goNext(){
  if(currentSlide < TOTAL_SLIDES - 1){ transitionTo(currentSlide + 1, 1); }
}
function goPrev(){
  if(currentSlide > 0){ transitionTo(currentSlide - 1, -1); }
}

/* ============================================================
   INIT
   ============================================================ */
renderSlide();
</script>
